services:
  backend:
    image: ptnk-chatbot-backend
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ptnk-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data:ro
    expose:
      - "8000"

  caddy:
    image: caddy:2
    container_name: ptnk-caddy
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
